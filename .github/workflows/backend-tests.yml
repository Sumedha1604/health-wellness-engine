name: Backend Tests

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Create root .env
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_HOST=127.0.0.1
          MYSQL_PORT=3306

          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=${{ secrets.MYSQL_USER }}
          DB_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          DB_NAME=${{ secrets.MYSQL_DATABASE }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=test
          EOF

      - name: Verify .env
        run: cat .env

      - name: Start MySQL
        run: docker compose up -d

      - name: Wait for MySQL
        run: |
          max_retries=30
          retry_count=0

          until docker compose exec -T mysql mysql \
            -uroot \
            -p${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e "SELECT 1;"
          do
            retry_count=$((retry_count + 1))
            if [ "$retry_count" -ge "$max_retries" ]; then
              echo "MySQL did not become ready after ${max_retries} retries."
              exit 1
            fi

            echo "Waiting for MySQL... (${retry_count}/${max_retries})"
            sleep 3
          done

      - name: Initialize Database Schema
        run: |
          docker compose exec -T mysql \
          mysql -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} \
          ${{ secrets.MYSQL_DATABASE }} < database/schema.sql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Data Pipeline Dependencies
        working-directory: data_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import Food Data
        run: python -m data_pipeline.importers.import_foods

      - name: Run Tests
        working-directory: backend
        run: npm test

      - name: Generate Coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Stop Docker Containers
        if: always()
        run: docker compose down -v
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage   